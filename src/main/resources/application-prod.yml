spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # OAuth2 소셜 로그인은 구현 완료 후 아래 환경변수로 활성화한다.
  # SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID=...
  # SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=...
  # SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID=...
  # (값이 없으면 이 블록 자체를 두지 않는다 — 빈 client-id는 시작 실패 원인)

fairway:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:fairway-gms}
    access-token-validity-seconds: ${JWT_ACCESS_VALIDITY_SECONDS}
    refresh-token-validity-seconds: ${JWT_REFRESH_VALIDITY_SECONDS}
    access-token-cookie-name: ${JWT_ACCESS_COOKIE_NAME:at}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:rt}
    access-token-cookie-path: ${JWT_ACCESS_COOKIE_PATH:/}
    refresh-token-cookie-path: ${JWT_REFRESH_COOKIE_PATH:/api/auth}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}
  app:
    frontend-url: ${FAIRWAY_GMS_FRONTEND_URL}
  bootstrap:
    admin:
      enabled: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_PASSWORD:}
      name: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_NAME:관리자}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

logging:
  level:
    root: WARN
    com.fairwaygms: INFO
