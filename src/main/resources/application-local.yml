spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fairway_gms?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope: profile, email
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/login/oauth2/code/naver}
            authorization-grant-type: authorization_code
            scope: name, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

fairway:
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:fairway-gms}
    access-token-validity-seconds: ${JWT_ACCESS_VALIDITY_SECONDS:3600}
    refresh-token-validity-seconds: ${JWT_REFRESH_VALIDITY_SECONDS:1209600}
    access-token-cookie-name: ${JWT_ACCESS_COOKIE_NAME:at}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:rt}
    access-token-cookie-path: ${JWT_ACCESS_COOKIE_PATH:/}
    refresh-token-cookie-path: ${JWT_REFRESH_COOKIE_PATH:/api/auth}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}
  app:
    frontend-url: ${FAIRWAY_GMS_FRONTEND_URL:http://localhost:5173}
  bootstrap:
    admin:
      enabled: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_PASSWORD:}
      name: ${FAIRWAY_GMS_BOOTSTRAP_ADMIN_NAME:관리자}
