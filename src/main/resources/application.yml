spring:
  application:
    name: fairway-gms-be
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.fairwaygms: DEBUG
